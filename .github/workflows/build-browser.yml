name: Build Cross-Platform Browser

on:
  push:
    branches: [ main ]
    paths:
      - 'browser/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'browser/**'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ./browser
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build Windows executable
      run: python build.py --platform windows
    
    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: kwai-browser-windows
        path: browser/dist/windows/

  build-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./browser
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1 libglib2.0-0
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build Linux executable
      run: python build.py --platform linux
    
    - name: Upload Linux artifact
      uses: actions/upload-artifact@v4
      with:
        name: kwai-browser-linux
        path: browser/dist/linux/

  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ./browser
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build macOS executable
      run: python build.py --platform mac
    
    - name: Upload macOS artifact
      uses: actions/upload-artifact@v4
      with:
        name: kwai-browser-macos
        path: browser/dist/mac/

  create-release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    
    - name: Create Release Archives
      run: |
        cd artifacts
        zip -r ../kwai-browser-windows.zip kwai-browser-windows/
        tar -czf ../kwai-browser-linux.tar.gz kwai-browser-linux/
        tar -czf ../kwai-browser-macos.tar.gz kwai-browser-macos/
    
    - name: Upload Release Assets
      uses: actions/upload-artifact@v4
      with:
        name: release-packages
        path: |
          kwai-browser-windows.zip
          kwai-browser-linux.tar.gz
          kwai-browser-macos.tar.gz
