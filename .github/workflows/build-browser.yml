name: Build Cross-Platform Browser

on:
  push:
    branches: [ main ]
    paths:
      - 'browser/**'
      - '.github/workflows/build-browser.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'browser/**'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ./browser
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build Windows executable
      run: python build.py --platform windows
    
    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: kwai-browser-windows
        path: browser/dist/windows/
        if-no-files-found: warn

  build-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./browser
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1 libglib2.0-0 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0 libfontconfig1 libdbus-1-3 libxcb-cursor0
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build Linux executable
      run: python build.py --platform linux
    
    - name: Upload Linux artifact
      uses: actions/upload-artifact@v4
      with:
        name: kwai-browser-linux
        path: browser/dist/linux/
        if-no-files-found: warn

  build-macos:
    runs-on: macos-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: ./browser
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build macOS executable
      run: python build.py --platform mac
    
    - name: Upload macOS artifact
      uses: actions/upload-artifact@v4
      with:
        name: kwai-browser-macos
        path: browser/dist/mac/
        if-no-files-found: warn

  create-release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        pattern: kwai-browser-*
        merge-multiple: false
      continue-on-error: true
    
    - name: Check artifacts
      run: |
        echo "Available artifacts:"
        ls -la artifacts/ || echo "No artifacts directory"
        
    - name: Create Release Archives
      run: |
        mkdir -p release
        
        if [ -d "artifacts/kwai-browser-windows" ] && [ "$(ls -A artifacts/kwai-browser-windows)" ]; then
          cd artifacts && zip -r ../release/kwai-browser-windows.zip kwai-browser-windows/
          cd ..
          echo "[OK] Windows package created"
        else
          echo "[Skip] Windows artifact not available"
        fi
        
        if [ -d "artifacts/kwai-browser-linux" ] && [ "$(ls -A artifacts/kwai-browser-linux)" ]; then
          cd artifacts && tar -czf ../release/kwai-browser-linux.tar.gz kwai-browser-linux/
          cd ..
          echo "[OK] Linux package created"
        else
          echo "[Skip] Linux artifact not available"
        fi
        
        if [ -d "artifacts/kwai-browser-macos" ] && [ "$(ls -A artifacts/kwai-browser-macos)" ]; then
          cd artifacts && tar -czf ../release/kwai-browser-macos.tar.gz kwai-browser-macos/
          cd ..
          echo "[OK] macOS package created"
        else
          echo "[Skip] macOS artifact not available"
        fi
    
    - name: Upload Release Assets
      uses: actions/upload-artifact@v4
      with:
        name: release-packages
        path: release/*
        if-no-files-found: warn
